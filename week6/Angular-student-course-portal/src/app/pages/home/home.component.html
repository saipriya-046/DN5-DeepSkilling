<div class="container">
  <h1>{{ portalName }}</h1>
  <p>Welcome to your one-stop portal for courses, enrollment, and grades.</p>

  <div class="stats">
    <span>Courses Available: {{ coursesAvailable }}</span> |
    <span>Enrolled: 3</span> |
    <span>GPA: 3.8</span>
  </div>

  <button [disabled]="!isPortalActive" (click)="onEnrollClick()">Enroll Now</button>
  <p *ngIf="message">{{ message }}</p>

  <div>
    <input [(ngModel)]="searchTerm" placeholder="Search courses..." />
    <p>Searching for: {{ searchTerm }}</p>
  </div>
</div>

<!--
  [property] is one-way: component -> DOM (e.g. [disabled]).
  [(ngModel)] is two-way: DOM <-> component, it's shorthand for
  [ngModel]="searchTerm" (ngModelChange)="searchTerm = $event"
-->
