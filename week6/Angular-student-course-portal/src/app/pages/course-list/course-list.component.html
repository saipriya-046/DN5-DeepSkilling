<div class="container">
  <h1>Course Listing</h1>

  <p *ngIf="isLoading">Loading courses...</p>

  <div *ngIf="!isLoading">
    <app-course-card
      *ngFor="let course of courses; trackBy: trackByCourseId"
      [course]="course"
      [isEnrolled]="course.id === selectedCourseId"
      (enrollRequested)="onEnroll($event)">
    </app-course-card>

    <p *ngIf="courses.length === 0">No courses available.</p>
  </div>

  <p *ngIf="selectedCourseId">Selected course ID: {{ selectedCourseId }}</p>
</div>
